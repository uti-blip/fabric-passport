services:
  - type: web
    name: fabric-passport-api
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://fabric-passport.vercel.app,http://localhost:3000
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
